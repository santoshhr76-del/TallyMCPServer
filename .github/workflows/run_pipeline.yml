name: Receivables Dashboard Pipeline

on:
  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

  # Scheduled: runs every day at 9:00 AM IST (3:30 AM UTC)
  schedule:
    - cron: '30 3 * * 1-6'   # Mon–Sat, 9:00 AM IST

jobs:
  run-pipeline:
    runs-on: self-hosted          # executes on your Windows machine

    defaults:
      run:
        working-directory: receivables-dashboard

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Run pipeline
        run: python main.py
