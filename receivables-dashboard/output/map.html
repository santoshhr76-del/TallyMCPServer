    #map {

    /* Title control box */
    .map-title-box {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);

      line-height: 1.4;

      font-weight: 400;

      margin-top: 2px;

      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.78rem;

      min-width: 195px;
    }

    .legend-box h4 {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #111;
      margin-bottom: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.25);
    }

    .legend-divider {
      border: none;
      border-top: 1px solid #ddd;
      margin: 8px 0;
    }

    /* Missing coords panel */
    .missing-panel {
      background: rgba(255, 253, 235, 0.97);
      border: 1px solid #f0c040;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.74rem;
      color: #555;
      max-width: 280px;

    .missing-panel h5 {

      font-weight: 700;

      margin-bottom: 5px;
    }

    .missing-panel ul {

      padding-left: 16px;
    }

    .missing-panel li {
      margin-bottom: 2px;
    }

    /* Popup overrides */

      font-size: 0.82rem;
      line-height: 1.5;
      min-width: 210px;
    }

    .popup-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .popup-amount {

      font-size: 0.95rem;
      color: #15803d;
      margin-bottom: 4px;
    }

    .popup-row {
      color: #444;
      margin-top: 2px;
    }

    .popup-label {
      color: #777;
      font-size: 0.75rem;
    }
  </style>

// ============================================================
// Helpers
// ============================================================

/**
 * Format a number in Indian comma notation: Rs 1,23,456
 */
function formatINR(amount) {
  var num = Math.round(amount);
  var s   = num.toString();
  if (s.length <= 3) return 'Rs\u00a0' + s;
  var last3  = s.slice(-3);
  var rest   = s.slice(0, -3);
  var groups = [];
  var i      = rest.length;
  while (i > 0) {
    groups.unshift(rest.slice(Math.max(0, i - 2), i));
    i -= 2;
  }
  return 'Rs\u00a0' + groups.join(',') + ',' + last3;
}

/**
 * Circle radius proportional to outstanding amount.
 * Scaled so min=8, max=30 pixels across the full data range.
 */
var allOutstanding = MAP_DATA.parties
  .filter(function(p) { return p.lat !== null; })
  .map(function(p)    { return p.outstanding;  });

var minOut = Math.min.apply(null, allOutstanding);
var maxOut = Math.max.apply(null, allOutstanding);

function getRadius(outstanding) {
  if (maxOut === minOut) return 15;
  var norm = (outstanding - minOut) / (maxOut - minOut);
  return Math.round(8 + norm * (30 - 8));
}

/**
 * Marker fill colour based on max_days_overdue:
 *   > 90 days  -> red
 *   > 30 days  -> orange
 *   otherwise  -> green
 */
function getColor(days) {
  if (days > 90) return '#ef4444';
  if (days > 30) return '#f97316';
  return '#22c55e';
}

function getBorderColor(days) {
  if (days > 90) return '#b91c1c';
  if (days > 30) return '#c2410c';
  return '#15803d';
}

// ============================================================
// Initialise Leaflet map -- centred on Udaipur
// ============================================================
var map = L.map('map', {
  center: [24.5937, 73.6855],
  zoom: 12
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

// ============================================================
// Title control (top-left)
// ============================================================

  options: { position: 'topleft' },
  onAdd: function() {
    var div = L.DomUtil.create('div', 'map-title-box');
    div.innerHTML =
      '<div>Receivables \u2014 Geographic Distribution</div>'

      + '<br>Generated: 2026-03-22 &nbsp;&bull;&nbsp; '
      + MAP_DATA.party_count + ' parties</div>';
    return div;
  }
});
new TitleControl().addTo(map);

// ============================================================
// Partition parties into plotted vs missing
// ============================================================
var plotted = [];
var missing = [];

MAP_DATA.parties.forEach(function(party) {
  if (party.lat !== null && party.lng !== null) {
    plotted.push(party);
  } else {
    missing.push(party);
  }
});

// ============================================================
// Plot circle markers
// ============================================================
plotted.forEach(function(party) {
  var days   = party.max_days_overdue || 0;
  var radius = getRadius(party.outstanding);
  var fill   = getColor(days);
  var border = getBorderColor(days);

  var circle = L.circleMarker([party.lat, party.lng], {
    radius:      radius,
    fillColor:   fill,
    color:       border,
    weight:      1.5,
    opacity:     0.9,
    fillOpacity: 0.60
  }).addTo(map);

  // -- Tooltip shown on hover --
  var ttip =
    '<strong>' + party.name + '</strong><br>'
    + formatINR(party.outstanding)
    + '<br>PIN ' + (party.pincode || 'N/A')
    + (party.place_name ? ' \u2014 ' + party.place_name : '');
  circle.bindTooltip(ttip, { sticky: true });

  // -- Popup shown on click --
  var addrLine = party.address
    ? '<div class="popup-row"><span class="popup-label">Address: </span>' + party.address + '</div>'
    : '';
  var pinLine = party.pincode
    ? '<div class="popup-row"><span class="popup-label">PIN: </span>'
        + party.pincode
        + (party.place_name ? ' \u2014 ' + party.place_name : '')
        + '</div>'
    : '';
  var stateLine = (party.state && party.state !== '0')
    ? '<div class="popup-row"><span class="popup-label">State: </span>' + party.state + '</div>'
    : '';
  var daysLine =
    '<div class="popup-row"><span class="popup-label">Max days overdue: </span>'
    + party.max_days_overdue + '</div>';

  var html =
    '<div class="popup-name">' + party.name + '</div>'
    + '<div class="popup-amount">' + formatINR(party.outstanding) + '</div>'
    + addrLine
    + pinLine
    + stateLine
    + daysLine;

  circle.bindPopup(html);
});

// ============================================================
// Missing-coordinates panel (bottom-left, shown only if needed)
// ============================================================
if (missing.length > 0) {
  var MissingControl = L.Control.extend({
    options: { position: 'bottomleft' },
    onAdd: function() {
      var div  = L.DomUtil.create('div', 'missing-panel');
      var list = missing.map(function(p) {
        return '<li>' + p.name
          + (p.pincode ? ' (' + p.pincode + ')' : ' \u2014 no PIN')
          + '</li>';
      }).join('');
      div.innerHTML =
        '<h5>Parties without coordinates (' + missing.length + ')</h5>'
        + '<ul>' + list + '</ul>';
      return div;
    }
  });
  new MissingControl().addTo(map);
}

// ============================================================
// Legend (bottom-right)
// ============================================================
var LegendControl = L.Control.extend({
  options: { position: 'bottomright' },
  onAdd: function() {
    var div = L.DomUtil.create('div', 'legend-box');
    div.innerHTML =
      '<h4>Days Overdue</h4>'
      + '<div class="legend-row">'
      +   '<div class="legend-dot" style="background:#22c55e;border-color:#15803d;"></div>'
      +   '<span>0 &ndash; 30 days (green)</span>'
      + '</div>'
      + '<div class="legend-row">'
      +   '<div class="legend-dot" style="background:#f97316;border-color:#c2410c;"></div>'
      +   '<span>31 &ndash; 90 days (orange)</span>'
      + '</div>'
      + '<div class="legend-row">'
      +   '<div class="legend-dot" style="background:#ef4444;border-color:#b91c1c;"></div>'
      +   '<span>&gt; 90 days (red)</span>'
      + '</div>'
      + '<hr class="legend-divider">'
      + '<h4>Marker Size</h4>'
      + '<div style="font-size:0.73rem;color:#555;line-height:1.5;">'
      +   'Proportional to outstanding<br>'
      +   'amount (8 &ndash; 30 px radius)'
      + '</div>'
      + '<hr class="legend-divider">'
      + '<div style="font-size:0.7rem;color:#888;">'
      +   'Hover for summary &bull; click for details'
      + '</div>';
    return div;
  }
});
new LegendControl().addTo(map);

// ============================================================
// Summary to browser console
// ============================================================
console.log('[OK] Map created -- ' + plotted.length + ' parties plotted, ' + missing.length + ' missing coordinates');
</script>
